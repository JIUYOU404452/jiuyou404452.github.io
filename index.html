<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<title>旧友的留言处</title>
<style>
  body {
    max-width: 700px;
    margin: 30px auto;
    padding: 0 15px;
    font-family: "微软雅黑", sans-serif;
    background: #f7f7f7;
  }
  h1 {
    text-align: center;
    color: #333;
  }
  .box {
    background: #fff;
    padding: 15px;
    border-radius: 8px;
    margin-bottom: 20px;
    box-shadow: 0 2px 5px #0002;
  }
  input, textarea {
    width: 100%;
    box-sizing: border-box;
    padding: 8px;
    margin: 6px 0;
    border: 1px solid #ccc;
    border-radius: 4px;
  }
  button {
    padding: 8px 14px;
    background: #007bff;
    color: #fff;
    border: none;
    border-radius: 4px;
    cursor: pointer;
  }
  button:hover {
    background: #0056b3;
  }
  .msg-item {
    border-bottom: 1px solid #eee;
    padding: 10px 0;
  }
  .msg-name {
    font-weight: bold;
    color: #007bff;
  }
  .msg-time {
    font-size: 12px;
    color: #888;
  }
  .reply-btn {
    font-size: 12px;
    color: #007bff;
    cursor: pointer;
    margin-left: 10px;
  }
  .reply-box {
    margin: 8px 0 8px 20px;
    display: none;
  }
  .reply-item {
    background: #f0f8ff;
    padding: 8px;
    border-radius: 6px;
    margin: 5px 0;
  }
  .del-btn {
    font-size: 12px;
    color: #dc3545;
    cursor: pointer;
    margin-left: 10px;
    display: none;
  }
</style>
</head>
<body>
<h1>旧友的留言处</h1>

<div class="box">
  <input type="password" id="adminPwd" placeholder="管理员密码（普通用户无需填写）" />
  <button onclick="loginAdmin()">进入管理模式</button>
</div>

<div class="box">
  <input type="text" id="nickname" placeholder="你的昵称" />
  <textarea id="content" rows="4" placeholder="写下你的留言..."></textarea>
  <button onclick="sendMessage()">发送留言</button>
</div>

<div id="msgList"></div>

<!-- 使用兼容的旧版 Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script>
  // 你的 Firebase 配置
  const firebaseConfig = {
    apiKey: "AIzaSyDGL47dfDwj4ZfmECU9D...",
    authDomain: "liaot-b9275.firebaseapp.com",
    databaseURL: "https://liaot-b9275-default-rtdb.asia-southeast1.firebasedatabase.app/",
    projectId: "liaot-b9275"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();
  const msgRef = db.ref("messages");

  let isAdmin = false;
  const ADMIN_PWD = "123456"; // 改成你自己的管理员密码

  function loginAdmin() {
    const pwd = document.getElementById("adminPwd").value;
    if (pwd === ADMIN_PWD) {
      isAdmin = true;
      alert("管理员模式已开启，刷新页面后可看到删除按钮");
      loadMessages();
    } else {
      alert("密码错误，无法进入管理模式");
    }
  }

  function sendMessage() {
    const name = document.getElementById("nickname").value.trim();
    const text = document.getElementById("content").value.trim();
    if (!name || !text) return alert("昵称和留言内容不能为空");

    msgRef.push({
      name,
      text,
      time: new Date().toLocaleString()
    });
    document.getElementById("content").value = "";
    loadMessages();
  }

  function loadMessages() {
    msgRef.once("value").then(snap => {
      const data = snap.val() || {};
      let html = "";
      for (const mid in data) {
        const m = data[mid];
        html += `
        <div class="msg-item" data-mid="${mid}">
          <span class="msg-name">${escapeHtml(m.name)}</span>
          <span class="msg-time">${m.time}</span>
          <span class="reply-btn" onclick="toggleReply('${mid}')">回复</span>
          <span class="del-btn" style="display:${isAdmin ? "inline" : "none"}" onclick="delMsg('${mid}')">删除</span>
          <div>${escapeHtml(m.text)}</div>

          <div class="reply-box" id="replyBox-${mid}">
            <input type="text" placeholder="你的昵称" class="reply-name" data-mid="${mid}" />
            <textarea rows="2" placeholder="写下你的回复..." class="reply-text" data-mid="${mid}"></textarea>
            <button onclick="sendReply('${mid}')">发送回复</button>
          </div>

          <div class="reply-list">
        `;
        if (m.replies) {
          for (const rid in m.replies) {
            const r = m.replies[rid];
            html += `
            <div class="reply-item" data-rid="${rid}">
              <span class="msg-name">${escapeHtml(r.name)}</span>
              <span class="msg-time">${r.time}</span>
              <span class="del-btn" style="display:${isAdmin ? "inline" : "none"}" onclick="delReply('${mid}','${rid}')">删除</span>
              <div>${escapeHtml(r.text)}</div>
            </div>
            `;
          }
        }
        html += `</div></div>`;
      }
      document.getElementById("msgList").innerHTML = html;
    }).catch(err => {
      console.error("加载留言失败:", err);
      document.getElementById("msgList").innerHTML = `<p style="color:red">加载留言失败：${err.message}</p>`;
    });
  }

  function toggleReply(mid) {
    const box = document.getElementById("replyBox-" + mid);
    box.style.display = box.style.display === "block" ? "none" : "block";
  }

  function sendReply(mid) {
    const name = document.querySelector(`.reply-name[data-mid="${mid}"]`).value.trim();
    const text = document.querySelector(`.reply-text[data-mid="${mid}"]`).value.trim();
    if (!name || !text) return alert("昵称和回复内容不能为空");

    msgRef.child(mid).child("replies").push({
      name,
      text,
      time: new Date().toLocaleString()
    });
    document.querySelector(`.reply-text[data-mid="${mid}"]`).value = "";
    loadMessages();
  }

  function delMsg(mid) {
    if (!confirm("确定要删除这条留言吗？删除后无法恢复")) return;
    msgRef.child(mid).remove().then(loadMessages);
  }

  function delReply(mid, rid) {
    if (!confirm("确定要删除这条回复吗？删除后无法恢复")) return;
    msgRef.child(mid).child("replies").child(rid).remove().then(loadMessages);
  }

  function escapeHtml(str) {
    return str.replace(/[&<>"']/g, s => ({
      '&': '&amp;',
      '<': '&lt;',
      '>': '&gt;',
      '"': '&quot;',
      "'": '&#39;'
    }[s]));
  }

  // 页面加载时自动加载留言
  window.onload = loadMessages;
  // 实时监听更新
  msgRef.on("value", loadMessages);
</script>
</body>
</html>
