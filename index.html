<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>旧友的留言处</title>
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{
    margin:0;
    padding:0;
    font-family:"微软雅黑",sans-serif;
    background:#f7f7f7;
  }
  .wrap{
    width:100%;
    max-width:600px;
    margin:0 auto;
    padding:10px;
  }
  h1{
    text-align:center;
    color:#333;
    font-size:20px;
    margin:10px 0;
  }
  .box{
    background:#fff;
    padding:12px;
    border-radius:8px;
    margin-bottom:10px;
    box-shadow:0 1px 3px #0002;
  }
  input,textarea{
    width:100%;
    padding:8px 10px;
    margin:6px 0;
    border:1px solid #ddd;
    border-radius:6px;
    font-size:14px;
  }
  button{
    padding:8px 14px;
    background:#007bff;
    color:#fff;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-size:14px;
  }
  button:hover{background:#0056b3;}

  #msgList{
    background:#fff;
    border-radius:8px;
    padding:10px;
    height:70vh;
    overflow-y:auto;
    box-shadow:0 1px 3px #0002;
  }

  .msg-item{
    border-bottom:1px solid #eee;
    padding:10px 0;
  }
  .msg-name{
    font-weight:bold;
    color:#007bff;
  }
  .msg-time{
    font-size:12px;
    color:#888;
    margin-left:8px;
  }
  .reply-toggle{
    font-size:13px;
    color:#007bff;
    cursor:pointer;
    margin:6px 0;
    display:inline-block;
  }
  .reply-box{
    margin:8px 0 8px 15px;
    display:none;
  }
  .reply-list{
    margin-left:15px;
  }
  .reply-item{
    background:#f0f8ff;
    padding:8px;
    border-radius:6px;
    margin:5px 0;
    font-size:14px;
  }
  .del-btn{
    font-size:12px;
    color:#dc3545;
    cursor:pointer;
    margin-left:10px;
    display:none;
  }

  .my-message{
    background:#dcfce7;
    text-align:right;
    border-radius:12px;
    padding:10px;
    margin:5px 0;
  }

  #toastPopup{
    display: none;
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(0,0,0,0.8);
    color: white;
    padding: 15px 25px;
    border-radius: 8px;
    z-index: 9999;
    font-size:14px;
  }
</style>
</head>
<body>
<div class="wrap">
  <h1>旧友的留言处</h1>

  <div class="box">
    <input type="password" id="adminPwd" placeholder="管理员密码"/>
    <button onclick="loginAdmin()">进入管理模式</button>
  </div>

  <div class="box">
    <input type="text" id="nickname" placeholder="你的昵称（只需填一次）"/>
    <textarea id="content" rows="3" placeholder="写下你的留言..."></textarea>
    <button onclick="sendMessage()">发送留言</button>
  </div>

  <div id="msgList"></div>

  <div id="toastPopup">
    <span id="toastText"></span>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script>
  const firebaseConfig = {
    apiKey: "AIzaSyDGL47dfDwj4ZfmECU9D1eA3aS1A2pL9n8",
    authDomain: "liaot-b9275.firebaseapp.com",
    databaseURL: "https://liaot-b9275-default-rtdb.asia-southeast1.firebasedatabase.app/",
    projectId: "liaot-b9275"
  };

  firebase.initializeApp(firebaseConfig);
  const db=firebase.database();
  const msgRef=db.ref("messages");

  let isAdmin=false;
  const ADMIN_PWD="jiuyou531";
  let lastMsgKey=null;

  function loginAdmin(){
    const pwd=document.getElementById("adminPwd").value;
    if(pwd===ADMIN_PWD){
      isAdmin=true;
      alert("管理员已登录");
      loadMessages();
      listenNewMsgForAdmin();
    }else{
      alert("密码错误");
    }
  }

  function showToast(text){
    const t=document.getElementById("toastPopup");
    document.getElementById("toastText").innerText=text;
    t.style.display="block";
    setTimeout(()=>t.style.display="none",2000);
  }

  function sendMessage(){
    const name=document.getElementById("nickname").value.trim();
    const text=document.getElementById("content").value.trim();
    if(!name||!text)return alert("昵称和留言不能为空");

    const now=new Date();
    const newMsg={name,text,time:now.toLocaleString()};
    const msgList=document.getElementById("msgList");
    const html=`
    <div class="msg-item my-message">
      <span class="msg-name">我</span>
      <span class="msg-time">${newMsg.time}</span>
      <div>${newMsg.text}</div>
    </div>`;
    msgList.insertAdjacentHTML("afterbegin",html);

    msgRef.push(newMsg).then(()=>{
      showToast("留言发送成功！");
      document.getElementById("content").value="";
    }).catch(()=>{
      loadMessages();
      showToast("发送失败");
    });
  }

  function loadMessages(){
    msgRef.once("value").then(snap=>{
      const data=snap.val()||{};
      let html="";
      const keys=Object.keys(data);
      if(keys.length>0)lastMsgKey=keys[keys.length-1];

      for(const mid in data){
        const m=data[mid];
        const rc=m.replies?Object.keys(m.replies).length:0;
        html+=`
        <div class="msg-item" data-mid="${mid}">
          <span class="msg-name">${escapeHtml(m.name)}</span>
          <span class="msg-time">${m.time}</span>
          <span class="del-btn" style="display:${isAdmin?"inline":"none"}" onclick="delMsg('${mid}')">删除</span>
          <div>${escapeHtml(m.text)}</div>
        `;

        if(rc>0){
          html+=`<div class="reply-toggle" onclick="toggleReplies('${mid}')">▼ 展开 ${rc} 条回复</div>`;
          html+=`<div class="reply-list" id="replyList-${mid}" style="display:none">`;
          for(const rid in m.replies){
            const r=m.replies[rid];
            html+=`
            <div class="reply-item" data-rid="${rid}">
              <span class="msg-name">${escapeHtml(r.name)}</span>
              <span class="msg-time">${r.time}</span>
              <span class="del-btn" style="display:${isAdmin?"inline":"none"}" onclick="delReply('${mid}','${rid}')">删除</span>
              <div>${escapeHtml(r.text)}</div>
            </div>`;
          }
          html+=`</div>`;
        }

        html+=`
        <div class="reply-box" id="replyBox-${mid}">
          <textarea rows="2" class="reply-text" data-mid="${mid}" placeholder="回复..."></textarea>
          <button onclick="sendReply('${mid}')">发送回复</button>
        </div>
        <span class="reply-toggle" onclick="toggleReplyBox('${mid}')">✏️ 回复</span>
        </div>`;
      }
      document.getElementById("msgList").innerHTML=html;
    });
  }

  function listenNewMsgForAdmin(){
    msgRef.on("value",snap=>{
      if(!isAdmin)return;
      const data=snap.val()||{};
      const keys=Object.keys(data);
      if(keys.length===0)return;
      const newKey=keys[keys.length-1];
      if(newKey!==lastMsgKey){
        lastMsgKey=newKey;
        const m=data[newKey];
        alert(`📩 新留言\n来自：${m.name}\n内容：${m.text}`);
        loadMessages();
      }
    });
  }

  function toggleReplies(mid){
    const e=document.getElementById("replyList-"+mid);
    const b=e.previousElementSibling;
    e.style.display=e.style.display=="none"?"block":"none";
    b.textContent=e.style.display=="block"?"▲ 收起回复":"▼ 展开 "+e.children.length+" 条回复";
  }

  function toggleReplyBox(mid){
    const e=document.getElementById("replyBox-"+mid);
    e.style.display=e.style.display=="block"?"none":"block";
  }

  function sendReply(mid){
    const n=document.getElementById("nickname").value.trim();
    const t=document.querySelector(`.reply-text[data-mid="${mid}"]`).value.trim();
    if(!n||!t)return alert("请填写昵称和回复");
    msgRef.child(mid).child("replies").push({
      name:n,text:t,time:new Date().toLocaleString()
    }).then(()=>{
      showToast("回复成功！");
      loadMessages();
    });
  }

  function delMsg(mid){
    if(!confirm("确定删除？"))return;
    msgRef.child(mid).remove().then(loadMessages);
  }

  function delReply(mid,rid){
    if(!confirm("确定删除？"))return;
    msgRef.child(mid).child("replies").child(rid).remove().then(loadMessages);
  }

  function escapeHtml(s){
    return s.replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  window.onload=loadMessages;
</script>
</body>
</html>
