<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>旧友的留言处</title>
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{
    margin:0;
    padding:0;
    font-family:"微软雅黑",sans-serif;
    background:#f7f7f7;
  }
  /* 中间固定框架（手机/PC都居中） */
  .wrap{
    width:100%;
    max-width:600px;
    margin:0 auto;
    padding:10px;
  }
  h1{
    text-align:center;
    color:#333;
    font-size:20px;
    margin:10px 0;
  }
  .box{
    background:#fff;
    padding:12px;
    border-radius:8px;
    margin-bottom:10px;
    box-shadow:0 1px 3px #0002;
  }
  input,textarea{
    width:100%;
    padding:8px 10px;
    margin:6px 0;
    border:1px solid #ddd;
    border-radius:6px;
    font-size:14px;
  }
  button{
    padding:8px 14px;
    background:#007bff;
    color:#fff;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-size:14px;
  }
  button:hover{background:#0056b3;}

  /* 留言列表：固定高度、可滚动 */
  #msgList{
    background:#fff;
    border-radius:8px;
    padding:10px;
    height:70vh; /* 可视高度，手机刚好 */
    overflow-y:auto; /* 只纵向滚动 */
    box-shadow:0 1px 3px #0002;
  }

  .msg-item{
    border-bottom:1px solid #eee;
    padding:10px 0;
  }
  .msg-name{
    font-weight:bold;
    color:#007bff;
  }
  .msg-time{
    font-size:12px;
    color:#888;
    margin-left:8px;
  }
  .reply-toggle{
    font-size:13px;
    color:#007bff;
    cursor:pointer;
    margin:6px 0;
    display:inline-block;
  }
  .reply-box{
    margin:8px 0 8px 15px;
    display:none;
  }
  .reply-list{
    margin-left:15px;
  }
  .reply-item{
    background:#f0f8ff;
    padding:8px;
    border-radius:6px;
    margin:5px 0;
    font-size:14px;
  }
  .del-btn{
    font-size:12px;
    color:#dc3545;
    cursor:pointer;
    margin-left:10px;
    display:none;
  }
</style>
</head>
<body>
<div class="wrap">
  <h1>旧友的留言处</h1>

  <!-- 管理员登录 -->
  <div class="box">
    <input type="password" id="adminPwd" placeholder="管理员密码（普通用户不用填）"/>
    <button onclick="loginAdmin()">进入管理模式</button>
  </div>

  <!-- 发留言（昵称只在这里填一次） -->
  <div class="box">
    <input type="text" id="nickname" placeholder="你的昵称（只需填一次）"/>
    <textarea id="content" rows="3" placeholder="写下你的留言..."></textarea>
    <button onclick="sendMessage()">发送留言</button>
  </div>

  <!-- 留言区：中间框架、可滚动 -->
  <div id="msgList"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script>
  const firebaseConfig = {
    apiKey: "AIzaSyDGL47dfDwj4ZfmECU9D...",
    authDomain: "liaot-b9275.firebaseapp.com",
    databaseURL: "https://liaot-b9275-default-rtdb.asia-southeast1.firebasedatabase.app/",
    projectId: "liaot-b9275"
  };

  firebase.initializeApp(firebaseConfig);
  const db=firebase.database();
  const msgRef=db.ref("messages");

  let isAdmin=false;
  const ADMIN_PWD="jiuyou531"; // 改你自己的

  function loginAdmin(){
    const pwd=document.getElementById("adminPwd").value;
    if(pwd===ADMIN_PWD){
      isAdmin=true;
      alert("管理员模式已开启");
      loadMessages();
    }else{
      alert("密码错误");
    }
  }

  // 发主留言
  function sendMessage(){
    const name=document.getElementById("nickname").value.trim();
    const text=document.getElementById("content").value.trim();
    if(!name||!text)return alert("昵称和留言不能为空");

    msgRef.push({
      name,
      text,
      time:new Date().toLocaleString()
    });
    document.getElementById("content").value="";
    loadMessages();
  }

  // 加载留言（含折叠回复）
  function loadMessages(){
    msgRef.once("value").then(snap=>{
      const data=snap.val()||{};
      let html="";
      for(const mid in data){
        const m=data[mid];
        const replyCount=m.replies?Object.keys(m.replies).length:0;

        html += `
        <div class="msg-item" data-mid="${mid}">
          <span class="msg-name">${escapeHtml(m.name)}</span>
          <span class="msg-time">${m.time}</span>
          <span class="del-btn" style="display:${isAdmin?"inline":"none"}" onclick="delMsg('${mid}')">删除</span>
          <div>${escapeHtml(m.text)}</div>
        `;

        // 回复折叠/展开
        if(replyCount>0){
          html += `<div class="reply-toggle" onclick="toggleReplies('${mid}')">▼ 展开 ${replyCount} 条回复</div>`;
          html += `<div class="reply-list" id="replyList-${mid}" style="display:none;">`;
          for(const rid in m.replies){
            const r=m.replies[rid];
            html += `
            <div class="reply-item" data-rid="${rid}">
              <span class="msg-name">${escapeHtml(r.name)}</span>
              <span class="msg-time">${r.time}</span>
              <span class="del-btn" style="display:${isAdmin?"inline":"none"}" onclick="delReply('${mid}','${rid}')">删除</span>
              <div>${escapeHtml(r.text)}</div>
            </div>
            `;
          }
          html += `</div>`;
        }

        // 回复输入框（自动带昵称）
        html += `
        <div class="reply-box" id="replyBox-${mid}">
          <textarea rows="2" placeholder="写下你的回复..." class="reply-text" data-mid="${mid}"></textarea>
          <button onclick="sendReply('${mid}')">发送回复</button>
        </div>
        <span class="reply-toggle" onclick="toggleReplyBox('${mid}')">✏️ 回复</span>
        </div>
        `;
      }
      document.getElementById("msgList").innerHTML=html;
    }).catch(err=>{
      console.error("加载失败：",err);
    });
  }

  // 展开/收起回复列表
  function toggleReplies(mid){
    const list=document.getElementById("replyList-"+mid);
    const btn=list.previousElementSibling;
    if(list.style.display==="none"){
      list.style.display="block";
      btn.textContent="▲ 收起回复";
    }else{
      list.style.display="none";
      btn.textContent="▼ 展开 "+list.children.length+" 条回复";
    }
  }

  // 显示/隐藏回复输入框
  function toggleReplyBox(mid){
    const box=document.getElementById("replyBox-"+mid);
    box.style.display=box.style.display==="block"?"none":"block";
  }

  // 发送回复（自动用上面的昵称）
  function sendReply(mid){
    const name=document.getElementById("nickname").value.trim();
    const text=document.querySelector(`.reply-text[data-mid="${mid}"]`).value.trim();
    if(!name||!text)return alert("请先填昵称和回复内容");

    msgRef.child(mid).child("replies").push({
      name,
      text,
      time:new Date().toLocaleString()
    });
    loadMessages();
  }

  function delMsg(mid){
    if(!confirm("确定删除这条留言？"))return;
    msgRef.child(mid).remove().then(loadMessages);
  }

  function delReply(mid,rid){
    if(!confirm("确定删除这条回复？"))return;
    msgRef.child(mid).child("replies").child(rid).remove().then(loadMessages);
  }

  function escapeHtml(str){
    return str.replace(/[&<>"']/g,s=>({
      '&':'&amp;',
      '<':'&lt;',
      '>':'&gt;',
      '"':'&quot;',
      "'":'&#39;'
    }[s]));
  }

  window.onload=loadMessages;
  msgRef.on("value",loadMessages);
</script>
</body>
</html>
